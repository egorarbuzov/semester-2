<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Just Air - Регистрация</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/user.css">
</head>
<body>

    <div class="top-bar">
        <div class="logo-area">
            <a href="main.html" class="logo-link">
                <img src="images/main-logo.png" class="logo-image">
                <span class="logo-text">Just Air</span>
            </a>
        </div>
        <div class="nav-icons">
            <i class="fas fa-search"></i>
            <i class="far fa-user-circle"></i>
            <i class="fas fa-bars"></i>
            <i class="fas fa-globe"></i>
        </div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-user-plus"></i>
                <h2>Регистрация</h2>
                <p>Создайте аккаунт для доступа ко всем возможностям</p>
            </div>
            
            <form class="auth-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="regFirstName">
                            <i class="fas fa-user"></i>
                            Имя
                        </label>
                        <input type="text" id="regFirstName" name="firstName" required placeholder="Иван">
                    </div>
                    
                    <div class="form-group">
                        <label for="regLastName">
                            <i class="fas fa-user"></i>
                            Фамилия
                        </label>
                        <input type="text" id="regLastName" name="lastName" required placeholder="Петров">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="regEmail">
                        <i class="fas fa-envelope"></i>
                        Email
                    </label>
                    <input type="email" id="regEmail" name="email" required placeholder="ivan@example.com">
                </div>
                
                <div class="form-group">
                    <label for="regPhone">
                        <i class="fas fa-phone"></i>
                        Телефон
                    </label>
                    <input type="tel" id="regPhone" name="phone" placeholder="+375 29 123-45-67">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="regPassword">
                            <i class="fas fa-lock"></i>
                            Пароль
                        </label>
                        <input type="password" id="regPassword" name="password" required placeholder="минимум 6 символов">
                    </div>
                    
                    <div class="form-group">
                        <label for="regConfirmPassword">
                            <i class="fas fa-check-circle"></i>
                            Подтверждение пароля
                        </label>
                        <input type="password" id="regConfirmPassword" name="confirmPassword" required placeholder="повторите пароль">
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="agreeTerms" required>
                        Я соглашаюсь с <a href="#" class="terms-link">условиями использования</a> и <a href="#" class="terms-link">политикой конфиденциальности</a>
                    </label>
                </div>
                
                <a href="cabinet.html" class="auth-btn">
                    <i class="fas fa-user-plus"></i> Зарегистрироваться
                </a>
            </form>
            
            <div class="auth-footer">
                <p>Уже есть аккаунт? <a href="login.html">Войти</a></p>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-grid">
            <div class="footer-col">
                <div class="footer-icon-row"><i class="fas fa-phone-alt"></i><span>+375 29 123-45-67</span></div>
                <div class="footer-icon-row"><i class="far fa-envelope"></i><span>support@justair.aero</span></div>
            </div>
            <div class="footer-col">
                <div class="footer-icon-row"><i class="fas fa-map-pin"></i><span>г. Минск, ул. Авиационная, 12</span></div>
                <div class="footer-icon-row"><i class="fas fa-clock"></i><span>Ежедневно 09:00 - 21:00</span></div>
            </div>
            <div class="footer-col">
            <div class="social-icons">
                <!-- Facebook -->
                <svg class="social-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
                </svg>
                
                <!-- Twitter -->
                <svg class="social-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/>
                </svg>
                
                <!-- Instagram -->
                <svg class="social-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                    <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
                    <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
                </svg>
                
                <!-- LinkedIn -->
                <svg class="social-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
                    <rect x="2" y="9" width="4" height="12"/>
                    <circle cx="4" cy="4" r="2"/>
                </svg>
            </div>
                <div class="social-label">соц. сети</div>
            </div>
        </div>
        <hr>
        <div class="footer-icon-row" style="justify-content: center;">
            <i class="fas fa-plane"></i>
            <i class="fas fa-globe-asia"></i>
        </div>
    </footer>

</body>
</html>
