<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Just Air - Регистрация</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/user.css">
</head>
<body>

    <div class="top-bar">
        <div class="logo-area">
            <a href="main.html" class="logo-link">
                <img src="images/main-logo.png" class="logo-image">
                <span class="logo-text">Just Air</span>
            </a>
        </div>
        <div class="nav-icons">
            <i class="fas fa-search"></i>
            <i class="far fa-user-circle"></i>
            <i class="fas fa-bars"></i>
            <i class="fas fa-globe"></i>
        </div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-user-plus"></i>
                <h2>Регистрация</h2>
                <p>Создайте аккаунт для доступа ко всем возможностям</p>
            </div>
            
            <form id="registerForm" class="auth-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="regFirstName">
                            <i class="fas fa-user"></i>
                            Имя
                        </label>
                        <input type="text" id="regFirstName" name="firstName" required placeholder="Иван">
                    </div>
                    
                    <div class="form-group">
                        <label for="regLastName">
                            <i class="fas fa-user"></i>
                            Фамилия
                        </label>
                        <input type="text" id="regLastName" name="lastName" required placeholder="Петров">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="regEmail">
                        <i class="fas fa-envelope"></i>
                        Email
                    </label>
                    <input type="email" id="regEmail" name="email" required placeholder="ivan@example.com">
                </div>
                
                <div class="form-group">
                    <label for="regPhone">
                        <i class="fas fa-phone"></i>
                        Телефон
                    </label>
                    <input type="tel" id="regPhone" name="phone" placeholder="+7 (999) 123-45-67">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="regPassword">
                            <i class="fas fa-lock"></i>
                            Пароль
                        </label>
                        <input type="password" id="regPassword" name="password" required placeholder="минимум 6 символов">
                    </div>
                    
                    <div class="form-group">
                        <label for="regConfirmPassword">
                            <i class="fas fa-check-circle"></i>
                            Подтверждение пароля
                        </label>
                        <input type="password" id="regConfirmPassword" name="confirmPassword" required placeholder="повторите пароль">
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="agreeTerms" required>
                        Я соглашаюсь с <a href="#" class="terms-link">условиями использования</a> и <a href="#" class="terms-link">политикой конфиденциальности</a>
                    </label>
                </div>
                
                <button type="submit" class="auth-btn">
                    <i class="fas fa-user-plus"></i> Зарегистрироваться
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Уже есть аккаунт? <a href="login.html">Войти</a></p>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-grid">
            <div class="footer-col">
                <div class="footer-icon-row"><i class="fas fa-phone-alt"></i><span>+7 (495) 123-45-67</span></div>
                <div class="footer-icon-row"><i class="far fa-envelope"></i><span>support@justair.aero</span></div>
            </div>
            <div class="footer-col">
                <div class="footer-icon-row"><i class="fas fa-map-pin"></i><span>Москва, ул. Авиационная, 12</span></div>
                <div class="footer-icon-row"><i class="fas fa-clock"></i><span>Ежедневно 09:00 - 21:00</span></div>
            </div>
            <div class="footer-col">
                <div class="social-icons">
                    <i class="fab fa-facebook-f"></i>
                    <i class="fab fa-twitter"></i>
                    <i class="fab fa-instagram"></i>
                    <i class="fab fa-linkedin-in"></i>
                </div>
                <div class="social-label">соц. сети</div>
            </div>
        </div>
        <hr>
        <div class="footer-icon-row" style="justify-content: center;">
            <i class="fas fa-plane"></i>
            <i class="fas fa-globe-asia"></i>
        </div>
    </footer>

    <script src="js/auth.js"></script>
</body>
</html>
