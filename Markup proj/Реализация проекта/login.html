<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Just Air - Вход в личный кабинет</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/user.css">
</head>
<body>

    <div class="top-bar">
        <div class="logo-area">
            <a href="main.html" class="logo-link">
                <img src="images/main-logo.png" class="logo-image">
                <span class="logo-text">Just Air</span>
            </a>
        </div>
        <div class="nav-icons">
            <i class="fas fa-search"></i>
            <i class="far fa-user-circle"></i>
            <i class="fas fa-bars"></i>
            <i class="fas fa-globe"></i>
        </div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-plane-departure"></i>
                <h2>Вход в личный кабинет</h2>
                <p>Добро пожаловать обратно!</p>
            </div>
            
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="loginEmail">
                        <i class="fas fa-envelope"></i>
                        Email
                    </label>
                    <input type="email" id="loginEmail" name="email" required placeholder="ivan@example.com">
                </div>
                
                <div class="form-group">
                    <label for="loginPassword">
                        <i class="fas fa-lock"></i>
                        Пароль
                    </label>
                    <input type="password" id="loginPassword" name="password" required placeholder="••••••••">
                </div>
                
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe"> Запомнить меня
                    </label>
                    <a href="#" class="forgot-link">Забыли пароль?</a>
                </div>
                
                <button type="submit" class="auth-btn">
                    <i class="fas fa-sign-in-alt"></i> Войти
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Нет аккаунта? <a href="register.html">Зарегистрироваться</a></p>
            </div>
            
            <div class="auth-divider">
                <span>или войдите через</span>
            </div>
            
            <div class="social-auth">
                <button class="social-btn google">
                    <i class="fab fa-google"></i> Google
                </button>
                <button class="social-btn facebook">
                    <i class="fab fa-facebook-f"></i> Facebook
                </button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-grid">
            <div class="footer-col">
                <div class="footer-icon-row"><i class="fas fa-phone-alt"></i><span>+7 (495) 123-45-67</span></div>
                <div class="footer-icon-row"><i class="far fa-envelope"></i><span>support@justair.aero</span></div>
            </div>
            <div class="footer-col">
                <div class="footer-icon-row"><i class="fas fa-map-pin"></i><span>Москва, ул. Авиационная, 12</span></div>
                <div class="footer-icon-row"><i class="fas fa-clock"></i><span>Ежедневно 09:00 - 21:00</span></div>
            </div>
            <div class="footer-col">
                <div class="social-icons">
                    <i class="fab fa-facebook-f"></i>
                    <i class="fab fa-twitter"></i>
                    <i class="fab fa-instagram"></i>
                    <i class="fab fa-linkedin-in"></i>
                </div>
                <div class="social-label">соц. сети</div>
            </div>
        </div>
        <hr>
        <div class="footer-icon-row" style="justify-content: center;">
            <i class="fas fa-plane"></i>
            <i class="fas fa-globe-asia"></i>
        </div>
    </footer>

    <script src="js/auth.js"></script>
</body>
</html>
