<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Qatar Airways Style — Статус рейсов</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #fff; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background: white; border-bottom: 1px solid #eef2f6; }
        .logo-icon { width: 48px; height: 48px; background: #8a2c2d; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; }
        .nav-icons { display: flex; gap: 1.5rem; }
        .nav-icons i { font-size: 1.4rem; color: #2c2e3a; cursor: pointer; transition: color 0.2s; }
        .nav-icons i:hover { color: #8a2c2d; }
        .page-hero { background: linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.2)), url('https://images.pexels.com/photos/62623/wing-plane-flying-airplane-62623.jpeg?auto=compress&cs=tinysrgb&w=1600') center/cover no-repeat; min-height: 320px; display: flex; align-items: center; justify-content: center; }
        .hero-icon-large { background: rgba(255,255,255,0.92); backdrop-filter: blur(8px); border-radius: 100px; padding: 1.2rem 2rem; }
        .hero-icon-large i { font-size: 3rem; color: #8a2c2d; }
        .container { max-width: 1280px; margin: 0 auto; padding: 2.5rem 2rem; }
        /* Табло статусов */
        .status-board { background: #f8fafd; border-radius: 40px; padding: 1.5rem; margin-top: 1.5rem; }
        .status-row { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; padding: 1.2rem 0; border-bottom: 1px solid #e2e8f0; }
        .status-row:last-child { border-bottom: none; }
        .flight-icon-group { display: flex; align-items: center; gap: 1rem; min-width: 140px; }
        .flight-icon-group i { font-size: 1.6rem; color: #4a5568; }
        .status-indicator { background: #eef2ff; border-radius: 40px; padding: 0.4rem 1rem; }
        .status-indicator i { font-size: 1.2rem; color: #8a2c2d; }
        .info-grid { display: flex; flex-wrap: wrap; gap: 2rem; justify-content: center; margin-top: 2rem; }
        .info-card { flex: 1; min-width: 200px; background: #ffffff; border-radius: 32px; padding: 2rem 1.5rem; text-align: center; box-shadow: 0 12px 30px rgba(0,0,0,0.05); border: 1px solid #f0f2f5; }
        .card-icon-lg { background: #fef2f2; width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto; }
        .card-icon-lg i { font-size: 2.5rem; color: #8a2c2d; }
        .action-button { background: #8a2c2d; border: none; border-radius: 40px; padding: 0.8rem 1.8rem; color: white; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: background 0.2s; margin-top: 1.5rem; }
        .action-button:hover { background: #631f20; }
        .footer { background: #f8fafd; padding: 3rem 2rem 2rem; border-top: 1px solid #eef2f6; margin-top: 3rem; }
        .footer-grid { max-width: 1280px; margin: 0 auto; display: flex; flex-wrap: wrap; justify-content: space-between; gap: 2rem; }
        .footer-col { flex: 1; min-width: 140px; display: flex; flex-direction: column; gap: 1rem; }
        .footer-icon-row { display: flex; gap: 1rem; align-items: center; }
        .footer-icon-row i { font-size: 1.5rem; color: #4a5568; }
        .social-icons { display: flex; gap: 1.5rem; }
        hr { margin: 2rem 0 1rem; border: none; border-top: 1px solid #e2e8f0; }
        @media (max-width: 800px) { .top-bar { padding: 0.8rem 1.5rem; } }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="logo-icon"><i class="fas fa-plane"></i></div>
        <div class="nav-icons">
            <i class="fas fa-search"></i>
            <i class="far fa-user-circle"></i>
            <i class="fas fa-bars"></i>
            <i class="fas fa-globe"></i>
        </div>
    </div>

    <div class="page-hero">
        <div class="hero-icon-large">
            <i class="fas fa-radar"></i>
        </div>
    </div>

    <div class="container">
        <!-- Табло статусов: каждый ряд — это рейс с иконками и индикатором -->
        <div class="status-board">
            <div class="status-row">
                <div class="flight-icon-group"><i class="fas fa-plane-departure"></i> <i class="fas fa-code-branch"></i> <i class="fas fa-clock"></i></div>
                <div class="status-indicator"><i class="fas fa-check-circle"></i> <i class="fas fa-hourglass-half"></i></div>
            </div>
            <div class="status-row">
                <div class="flight-icon-group"><i class="fas fa-plane-arrival"></i> <i class="fas fa-map-pin"></i> <i class="fas fa-flag-checkered"></i></div>
                <div class="status-indicator"><i class="fas fa-cloud-sun"></i> <i class="fas fa-check"></i></div>
            </div>
            <div class="status-row">
                <div class="flight-icon-group"><i class="fas fa-exchange-alt"></i> <i class="fas fa-route"></i> <i class="fas fa-charging-station"></i></div>
                <div class="status-indicator"><i class="fas fa-bell"></i> <i class="fas fa-info-circle"></i></div>
            </div>
            <div class="status-row">
                <div class="flight-icon-group"><i class="fas fa-head-side-goggles"></i> <i class="fas fa-tachometer-alt"></i> <i class="fas fa-clock"></i></div>
                <div class="status-indicator"><i class="fas fa-thumbs-up"></i> <i class="fas fa-shield-alt"></i></div>
            </div>
        </div>

        <!-- Дополнительные карточки: поиск и обновление -->
        <div class="info-grid">
            <div class="info-card"><div class="card-icon-lg"><i class="fas fa-search-location"></i></div></div>
            <div class="info-card"><div class="card-icon-lg"><i class="fas fa-sync-alt"></i></div></div>
        </div>

        <div style="display: flex; justify-content: center;">
            <button class="action-button" aria-label="track flights"><i class="fas fa-location-arrow"></i> <i class="fas fa-chart-simple"></i></button>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-grid">
            <div class="footer-col"><div class="footer-icon-row"><i class="fas fa-phone-alt"></i></div><div class="footer-icon-row"><i class="far fa-envelope"></i></div></div>
            <div class="footer-col"><div class="footer-icon-row"><i class="fas fa-map-pin"></i></div><div class="footer-icon-row"><i class="fas fa-clock"></i></div></div>
            <div class="footer-col"><div class="social-icons"><i class="fab fa-facebook-f"></i><i class="fab fa-twitter"></i><i class="fab fa-instagram"></i><i class="fab fa-linkedin-in"></i></div></div>
        </div>
        <hr>
        <div class="footer-icon-row" style="justify-content: center;"><i class="fas fa-plane"></i><i class="fas fa-globe-asia"></i></div>
    </footer>
</body>
</html>
